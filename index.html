<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
     <div class="outer-div">
        <div class="display">
          0
        </div>
        <button class="backspace" onclick="Back()"><i class="fa-solid fa-delete-left"></i></button>
<hr/>
        <div class="buttons">
          <button class="button" onclick="clearDisplay()" style="color: green;">C</button>
          <button class="button" onclick="One()">1</button>
          <button class="button" onclick="Two()">2</button>
          <button class="button" onclick="Add(), Addition()" style="font-size: 40px; display:flex; align-items:center; justify-content:center;">+</button>
          <button class="button" onclick="Three()">3</button>
          <button class="button" onclick="Four()">4</button>
          <button class="button" onclick="Five()">5</button>
          <button class="button" onclick="Subtract()" style="font-size: 40px; display:flex; align-items:center; justify-content:center;">-</button>
          <button class="button" onclick="Six()">6</button>
          <button class="button" onclick="Seven()">7</button>
          <button class="button" onclick="Eight()">8</button>
          <button class="button" onclick="Multiply()" style="font-size: 40px; display:flex; align-items:center; justify-content:center;">x</button>
          <button class="button" onclick="Nine()">9</button>
          <button class="button" onclick="Zero()">0</button>
          <button class="button" onclick="Divide()" style="font-size: 40px; display:flex; align-items:center; justify-content:center;">÷</button>
          <button class="button" onclick="Equal()" style="background-color: green; font-size: 40px; display:flex; align-items:center; justify-content:center;">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
